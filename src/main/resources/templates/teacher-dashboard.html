<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">

<body>
<section class="py-5" style="max-width:1200px; margin:auto;">
    
    <h2 class="fw-bold text-center">
        Hello, <span th:text="${session.user.name}"></span> 👋
    </h2>
    <p class="text-center text-muted mb-4">Teacher Dashboard</p>

    <div class="row justify-content-center g-4 text-center">

        <div class="col-md-4">
            <a href="/teacher/create-quiz" class="p-4 rounded shadow-sm d-block text-decoration-none dashboard-link">
                <div class="fs-1 mb-2">➕</div>
                <h4>Create Quiz</h4>
                <p class="text-muted">Add quizzes & questions</p>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/teacher/results" class="p-4 rounded shadow-sm d-block text-decoration-none dashboard-link">
                <div class="fs-1 mb-2">👥</div>
                <h4>Student Performance</h4>
                <p class="text-muted">Check student scores</p>
            </a>
        </div>

    </div>


</section>
</body>
</html>
