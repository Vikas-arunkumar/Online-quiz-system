<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">

<body style="background:#f8f9ff;">

<div class="container mt-4 d-flex justify-content-center">
    <div class="bg-white shadow rounded p-4" style="width:700px;">

        <h3 class="fw-bold text-center mb-3">Add Questions to Quiz 📝</h3>

        <form th:action="@{'/teacher/quiz/' + ${quizId} + '/add-questions'}" method="post" id="questionForm">

            <div id="questionsWrapper">
                <div class="question-block border rounded p-3 mb-3">
                    <label class="fw-semibold">Question</label>
                    <input type="text" name="questionText" class="form-control mb-2" required>

                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <input type="text" name="optionA" class="form-control" placeholder="Option A" required>
                        </div>
                        <div class="col-md-6 mb-2">
                            <input type="text" name="optionB" class="form-control" placeholder="Option B" required>
                        </div>
                        <div class="col-md-6 mb-2">
                            <input type="text" name="optionC" class="form-control" placeholder="Option C" required>
                        </div>
                        <div class="col-md-6 mb-2">
                            <input type="text" name="optionD" class="form-control" placeholder="Option D" required>
                        </div>
                    </div>

                    <label class="fw-semibold mt-2">Correct Answer</label>
                    <select name="correctOption" class="form-select w-50" required>
                        <option value="" disabled selected>Select</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
            </div>

            <!-- Add Question Button -->
            <button type="submit" class="btn btn-primary w-100 fw-semibold mb-2">
            ➕ Add Question
            </button>

            <!-- Finish Quiz / Publish Button -->
            <a th:href="@{/teacher/dashboard}" class="btn btn-success w-100 fw-semibold">
            ✅ Finish & Publish Quiz
            </a>

        </form>
    </div>
</div>

</body>
</html>
