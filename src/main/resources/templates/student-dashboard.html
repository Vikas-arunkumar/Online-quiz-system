<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">
<body>
<section class="py-5" style="max-width:1200px; margin:auto;">
    <h2 class="fw-bold text-center">
        Hello, <span th:text="${session.user.name}"></span> 👋
    </h2>
    <p class="text-center text-muted mb-4">Student Dashboard</p>

    <div class="row justify-content-center g-4 text-center">

        <div class="col-md-4">
            <a href="/student/quizzes" class="p-4 rounded shadow-sm d-block text-decoration-none dashboard-link">
                <div class="fs-1 mb-2">📚</div>
                <h4>Your Quizzes</h4>
                <p class="text-muted">Attempt available quizzes</p>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/student/results" class="p-4 rounded shadow-sm d-block text-decoration-none dashboard-link">
                <div class="fs-1 mb-2">📊</div>
                <h4>Results</h4>
                <p class="text-muted">View your quiz scores</p>
            </a>
        </div>

    </div>
</section>
</body>
</html>
