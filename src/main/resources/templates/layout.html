<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="page(content)">
<head>
    <title>Quiz App</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark px-4" style="background-color:#1f3bb3;">
    <a class="navbar-brand fw-bold" href="/">Quiz App</a>
    <div class="ms-auto">
        <a class="btn btn-light btn-sm" href="/logout">Logout</a>
    </div>
</nav>

<!-- keep your existing fragment so old usage still works -->
<div class="container mt-5" th:fragment="content(content)">
    <th:block th:replace="${content}"></th:block>
</div>

<footer class="text-center mt-4 mb-3 text-muted">
    <small>© Quiz App 2025 | Built with Spring + Thymeleaf</small>
</footer>

</body>
</html>
