<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">

<body style="background:#f8f9ff;">

<div class="container mt-5 d-flex justify-content-center">
    <div class="bg-white shadow rounded p-4" style="width:450px;">

        <h3 class="fw-bold text-center mb-3">Create Quiz 📝</h3>

        <form th:action="@{/teacher/create-quiz}" method="post">

            <!-- Quiz Title -->
            <div class="mb-3">
                <label class="fw-semibold">Quiz Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter quiz title" required>
            </div>

            <!-- Quiz Topic -->
            <div class="mb-3">
                <label class="fw-semibold">Topic</label>
                <input type="text" name="topic" class="form-control" placeholder="Enter quiz topic" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                ✅ Create Quiz
            </button>
        </form>

    </div>
</div>

</body>
</html>
