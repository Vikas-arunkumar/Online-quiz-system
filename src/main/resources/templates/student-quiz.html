<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: page(~{::body})}">

<body>

<div class="container mt-4">

    <h2 class="mb-3 text-primary fw-bold" th:text="${quiz.title}"></h2>

    <form th:action="@{'/student/quiz/' + ${quiz.id} + '/submit'}" method="post">

        <!-- ✅ Hidden field to send quizId -->
        <input type="hidden" name="quizId" th:value="${quiz.id}">

        <div class="card shadow p-4">

            <div th:each="q, i : ${questions}" class="mb-3">

                <p class="fw-semibold">
                    <span th:text="${i.index + 1}"></span>.
                    <span th:text="${q.text}"></span>
                </p>

                <div class="form-check">
                    <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="A">
                    <label class="form-check-label" th:text="${q.optionA}"></label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="B">
                    <label class="form-check-label" th:text="${q.optionB}"></label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="C">
                    <label class="form-check-label" th:text="${q.optionC}"></label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="radio" th:name="'q_' + ${q.id}" value="D">
                    <label class="form-check-label" th:text="${q.optionD}"></label>
                </div>

                <hr>
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold">
                Submit Quiz
            </button>

        </div>

    </form>

</div>

</body>
</html>
